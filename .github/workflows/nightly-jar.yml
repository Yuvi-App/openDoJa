name: Nightly JAR

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-nightly-jar:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Resolve project version
        id: project
        run: |
          version=$(python - <<'PY'
          import xml.etree.ElementTree as ET
          root = ET.parse("pom.xml").getroot()
          print(root.find("{http://maven.apache.org/POM/4.0.0}version").text.strip())
          PY
          )
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build standalone JAR
        run: mvn -B -DskipTests package

      - name: Upload nightly artifact
        uses: actions/upload-artifact@v4
        with:
          name: opendoja-nightly-${{ steps.project.outputs.version }}-${{ github.sha }}
          path: target/opendoja-${{ steps.project.outputs.version }}.jar
          if-no-files-found: error
